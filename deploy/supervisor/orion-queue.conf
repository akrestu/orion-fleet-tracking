[program:orion-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/orion/artisan queue:work --sleep=3 --tries=3 --max-time=3600
directory=/var/www/orion
numprocs=2
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/orion/storage/logs/queue.log
stopwaitsecs=3600
